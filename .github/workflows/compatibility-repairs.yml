name: Compatibility repairs

on:
  workflow_dispatch:
    inputs:
      full:
        description: "Run the full workspace test suite after targeted checks"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  targeted:
    name: Targeted validation
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Cookie compatibility tests
        run: cargo test -p obscura-net cookie

      - name: HTTP client hint tests
        run: cargo test -p obscura-net client_hints_follow_selected_user_agent

      - name: SSRF guard tests
        run: cargo test -p obscura-net ssrf_tests

      - name: CDP input tests
        run: cargo test -p obscura-cdp input

      - name: CLI update helper check
        run: cargo check -p obscura-cli --bin obscura-check-update

      - name: Full workspace tests
        if: ${{ inputs.full == 'true' }}
        run: cargo test
